name: Angular 20
description: >-
  Complete API reference for Angular 20 framework.
image: https://angular.io/assets/images/logos/angular/angular.png
url: https://angular.io
created: '2024'
modified: '2024'
apis:
  - name: Angular Core API
    description: >-
      Core Angular framework APIs including components, directives, and dependency
      injection.
    baseURL: https://angular.io/api/core
    humanURL: https://angular.io/api/core
    properties:
      - type: Documentation
        url: https://angular.io/docs
      - type: OpenAPI
        url: https://angular.io/api/core/openapi.json
    tags:
      - Components
      - Decorators
      - Dependency Injection
      - Directives
      - Lifecycle Hooks
  - name: Angular Common API
    description: >-
      Common utilities, pipes, directives, and HTTP client.
    baseURL: https://angular.io/api/common
    humanURL: https://angular.io/api/common
    properties:
      - type: Documentation
        url: https://angular.io/api/common
    tags:
      - Date
      - Directives
      - HTTP Client
      - Location
      - Pipes
  - name: Angular Forms API
    description: >-
      Reactive and template-driven forms APIs.
    baseURL: https://angular.io/api/forms
    humanURL: https://angular.io/api/forms
    properties:
      - type: Documentation
        url: https://angular.io/guide/forms-overview
    tags:
      - Form Controls
      - Forms
      - Reactive Forms
      - Validation
  - name: Angular Router API
    description: >-
      Client-side routing and navigation.
    baseURL: https://angular.io/api/router
    humanURL: https://angular.io/api/router
    properties:
      - type: Documentation
        url: https://angular.io/guide/routing-overview
    tags:
      - Guards
      - Navigation
      - Resolvers
      - Routing
  - name: Angular Animations API
    description: >-
      Animation framework for Angular applications.
    baseURL: https://angular.io/api/animations
    humanURL: https://angular.io/api/animations
    properties:
      - type: Documentation
        url: https://angular.io/guide/animations
    tags:
      - Animations
      - Keyframes
      - Transitions
  - name: Angular Platform Browser API
    description: >-
      Browser-specific platform APIs and bootstrapping.
    baseURL: https://angular.io/api/platform-browser
    humanURL: https://angular.io/api/platform-browser
    properties:
      - type: Documentation
        url: https://angular.io/api/platform-browser
    tags:
      - Browser
      - DOM
      - Meta Tags
      - Title Service
  - name: Angular CLI
    description: >-
      Command-line interface tools for Angular development.
    baseURL: https://angular.io/cli
    humanURL: https://angular.io/cli
    properties:
      - type: Documentation
        url: https://angular.io/cli
      - type: GitHub
        url: https://github.com/angular/angular-cli
    tags:
      - Build Tools
      - CLI
      - Development
      - Schematics
  - name: Angular Signals API
    description: >-
      Reactive state management with signals.
    baseURL: https://angular.io/api/core/signal
    humanURL: https://angular.io/guide/signals
    properties:
      - type: Documentation
        url: https://angular.io/guide/signals
    tags:
      - Computed Values
      - Reactivity
      - Signals
      - State Management
